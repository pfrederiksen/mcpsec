version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: mcpsec
    main: ./cmd/mcpsec
    binary: mcpsec
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: mcpsec
    repository:
      owner: pfrederiksen
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/pfrederiksen/mcpsec"
    description: "OWASP MCP Top 10 security scanner for Model Context Protocol servers"
    license: "Apache-2.0"
    install: |
      bin.install "mcpsec"
    test: |
      system "#{bin}/mcpsec", "version"
