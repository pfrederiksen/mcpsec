id: MCP04-R01
name: Hardcoded Secrets in Environment Variables
severity: critical
owasp_mcp: MCP04
description: |
  Detects hardcoded secrets, API keys, tokens, and passwords in MCP server
  environment variable configurations. Secrets stored in plaintext within
  configuration files can be leaked through version control, logs, or
  unauthorized file access.
references:
  - https://owasp.org/www-project-mcp-top-10/
match:
  path: "$.mcpServers..env"
  pattern: "(API_KEY|SECRET|TOKEN|PASSWORD|PRIVATE_KEY|DATABASE_URL).*[:=]\\s*[\"']?[A-Za-z0-9_\\-\\+/]{16,}"
  type: regex
remediation: |
  Never store secrets directly in MCP configuration files. Use a secrets
  manager (e.g., AWS Secrets Manager, HashiCorp Vault, or environment-level
  injection from a CI/CD pipeline). Reference secrets via placeholder
  syntax or external secret store URIs instead of plaintext values.
