version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused

  settings:
    govet:
      shadow: true
    errcheck:
      check-type-assertions: true
      check-blank: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
